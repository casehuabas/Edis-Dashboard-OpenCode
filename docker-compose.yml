version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: development
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    environment:
      PORT: 8080
      VITE_API_URL: http://backend:3000
  database:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edis
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: edis_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: